<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>oidc-mock — Select User</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; padding: 2rem; }
        h1 { text-align: center; margin-bottom: 0.5rem; color: #333; font-size: 1.5rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .user-card { background: white; border: 2px solid #e0e0e0; border-radius: 8px; padding: 1rem 1.5rem; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; display: block; width: 100%; text-align: left; font-size: 1rem; }
        .user-card:hover { border-color: #4a90d9; box-shadow: 0 2px 8px rgba(74, 144, 217, 0.15); }
        .user-name { font-weight: 600; color: #333; }
        .user-email { color: #666; font-size: 0.85rem; }
        .user-claims { color: #999; font-size: 0.8rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>oidc-mock</h1>
        <p class="subtitle">Select a user to log in as</p>
        {{range .Users}}
        <form method="POST" action="/authorize/callback">
            <input type="hidden" name="sub" value="{{.Sub}}">
            <input type="hidden" name="client_id" value="{{$.ClientID}}">
            <input type="hidden" name="redirect_uri" value="{{$.RedirectURI}}">
            <input type="hidden" name="state" value="{{$.State}}">
            <input type="hidden" name="nonce" value="{{$.Nonce}}">
            <input type="hidden" name="scope" value="{{$.Scope}}">
            <button type="submit" class="user-card">
                <div class="user-name">{{.Name}}</div>
                <div class="user-email">{{.Email}}</div>
                {{if .Claims}}<div class="user-claims">{{range $k, $v := .Claims}}{{$k}}: {{$v}} {{end}}</div>{{end}}
            </button>
        </form>
        {{end}}
    </div>
</body>
</html>
